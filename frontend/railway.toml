# VariaVaria — Frontend (Next.js)
# Railway dashboard: Root Directory = "frontend"
#
# Deploy the three backend services FIRST to obtain their public URLs, then
# set these variables here before the first frontend deploy:
#
# Required variables (Railway → Variables):
#   NEXT_PUBLIC_AUTH_SERVICE_URL     = https://<auth-service>.up.railway.app
#   NEXT_PUBLIC_PRODUCTS_SERVICE_URL = https://<products-service>.up.railway.app
#   NEXT_PUBLIC_ORDERS_SERVICE_URL   = https://<orders-service>.up.railway.app
#   NODE_ENV                         = production
#   NEXT_TELEMETRY_DISABLED          = 1
#
# These vars are injected as Docker build-args (ARG declarations exist in the
# Dockerfile) so they must be set before the build runs, not just at runtime.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
